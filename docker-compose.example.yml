services:
  ha-light-panel:
    build: .
    container_name: ha-light-panel
    restart: unless-stopped
    ports:
      - "8890:8890"
    environment:
      HA_URL: "http://homeassistant.local:8123"
      HA_BROWSER_URL: "http://homeassistant.local:8123"
      HA_TOKEN: "${HA_TOKEN}"
      CONFIG_PATH: "/app/config.json"
    volumes:
      - ./config.json:/app/config.json:ro
